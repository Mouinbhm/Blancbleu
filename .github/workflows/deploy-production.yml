name: Deploy Production

# Déploiement PRODUCTION — MANUEL UNIQUEMENT (workflow_dispatch).
# Jamais déclenché par un push. Exige une confirmation explicite et tague les
# images production-{version} (pas de "latest" mouvant en prod).
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version à déployer (ex: 1.3.0)"
        required: true
        type: string
      confirm:
        description: 'Taper CONFIRM pour autoriser le déploiement prod'
        required: true
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/blancbleu

jobs:
  # ── Garde : confirmation manuelle obligatoire ──────────────────────────────
  guard:
    name: Confirmation guard
    runs-on: ubuntu-latest
    steps:
      - name: Vérifier la saisie CONFIRM
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "CONFIRM" ]; then
            echo "Confirmation invalide — taper exactement CONFIRM. Abandon."
            exit 1
          fi
          echo "Confirmation OK pour la version ${{ github.event.inputs.version }}"

  # ── Gate de tests ──────────────────────────────────────────────────────────
  test:
    name: Test gate
    runs-on: ubuntu-latest
    needs: guard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json
      - name: Install server deps
        working-directory: server
        run: npm ci
      - name: Unit + integration
        working-directory: server
        env:
          JWT_SECRET: test-secret-ci-blancbleu
          NODE_ENV: test
        run: |
          npm run test:unit
          npm run test:integration

  # ── Build + push images taguées production-{version} ───────────────────────
  build-and-push:
    name: Build & push (production-${{ github.event.inputs.version }})
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - { name: server, context: ./server }
          - { name: client, context: ./client }
          - { name: ai-service, context: ./ai-service }
    steps:
      - uses: actions/checkout@v4
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build & push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-${{ matrix.name }}:production-${{ github.event.inputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Déploiement SSH avec rollback automatique ──────────────────────────────
  deploy:
    name: Deploy to production host
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: SSH deploy + healthcheck + rollback
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd /opt/blancbleu
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            NEW_TAG="production-${{ github.event.inputs.version }}"
            PREV_TAG="$(cat .deployed_tag 2>/dev/null || echo '')"
            echo "Déploiement $NEW_TAG (précédent: ${PREV_TAG:-aucun})"

            deploy_tag() {
              export IMAGE_TAG="$1"
              docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
              docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            }

            healthcheck() {
              for i in $(seq 1 5); do
                if curl -fsS http://localhost:5000/api/health > /dev/null; then
                  echo "Healthcheck OK (tentative $i)"; return 0
                fi
                echo "Healthcheck KO, retry 10s ($i/5)"; sleep 10
              done
              return 1
            }

            deploy_tag "$NEW_TAG"
            if healthcheck; then
              echo "$NEW_TAG" > .deployed_tag
              echo "Déploiement réussi."
            else
              echo "ÉCHEC healthcheck — ROLLBACK"
              if [ -n "$PREV_TAG" ]; then
                deploy_tag "$PREV_TAG"
                healthcheck && echo "Rollback OK vers $PREV_TAG" || echo "Rollback KO — intervention manuelle requise"
              else
                echo "Aucune version précédente connue — pas de rollback auto."
              fi
              exit 1
            fi
