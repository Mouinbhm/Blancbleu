name: Deploy Staging

# Déploiement automatique sur staging à chaque push sur develop (ou manuel).
# Garde de qualité : le job `test` doit passer avant build & deploy. (GitHub
# ne permet pas `needs:` inter-workflows — on ré-exécute donc le gate de tests
# ici plutôt que de supposer que ci.yml a tourné.)
on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/blancbleu

jobs:
  # ── Gate de tests (équivaut à test-server de ci.yml) ───────────────────────
  test:
    name: Test gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json
      - name: Install server deps
        working-directory: server
        run: npm ci
      - name: Unit + integration
        working-directory: server
        env:
          JWT_SECRET: test-secret-ci-blancbleu
          NODE_ENV: test
        run: |
          npm run test:unit
          npm run test:integration

  # ── Build + push des 3 images vers GHCR ────────────────────────────────────
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - { name: server, context: ./server }
          - { name: client, context: ./client }
          - { name: ai-service, context: ./ai-service }
    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.name }}:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-${{ matrix.name }}:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Déploiement SSH sur le host staging ────────────────────────────────────
  deploy:
    name: Deploy to staging host
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd /opt/blancbleu
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            export IMAGE_TAG=staging-latest
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

      - name: Healthcheck post-deploy (retry 5x)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            for i in $(seq 1 5); do
              if curl -fsS http://localhost:5000/api/health > /dev/null; then
                echo "Healthcheck OK (tentative $i)"
                exit 0
              fi
              echo "Healthcheck KO, retry dans 10s ($i/5)"
              sleep 10
            done
            echo "Healthcheck échoué après 5 tentatives"
            exit 1
