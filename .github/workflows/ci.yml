name: BlancBleu CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1 — Tests Backend Node.js
  # ──────────────────────────────────────────────────────────────────────────
  test-server:
    name: Tests Backend (Node.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Run unit tests
        working-directory: server
        env:
          JWT_SECRET: test-secret-ci-blancbleu
          NODE_ENV: test
        run: npm run test:unit

      - name: Run integration tests
        working-directory: server
        env:
          JWT_SECRET: test-secret-ci-blancbleu
          NODE_ENV: test
        run: npm run test:integration

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-server
          path: server/coverage/

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2 — Tests IA (Python / FastAPI)
  # ──────────────────────────────────────────────────────────────────────────
  test-ia:
    name: Tests IA (Python / FastAPI)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ai-service/requirements-ci.txt

      - name: Install Python dependencies (CI — sans binaires système)
        working-directory: ai-service
        run: pip install -r requirements-ci.txt

      - name: Run IA tests
        working-directory: ai-service
        run: pytest tests/test_ia.py -v --tb=short

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 3 — Lint Frontend
  # ──────────────────────────────────────────────────────────────────────────
  lint-client:
    name: Lint Frontend (React)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build check
        working-directory: client
        env:
          CI: false
          REACT_APP_API_URL: http://localhost:5000/api
        run: npm run build

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 4 — Résumé (badge de statut)
  # ──────────────────────────────────────────────────────────────────────────
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [test-server, test-ia, lint-client]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.test-server.result }}" != "success" ]]; then
            echo "Tests server échoués"
            exit 1
          fi
          if [[ "${{ needs.test-ia.result }}" != "success" ]]; then
            echo "Tests IA échoués"
            exit 1
          fi
          if [[ "${{ needs.lint-client.result }}" != "success" ]]; then
            echo "Lint client échoué"
            exit 1
          fi
          echo "Tous les checks CI sont verts"
