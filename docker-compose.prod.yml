version: "3.9"

# ══════════════════════════════════════════════════════════════════════════════
# BlancBleu — Override production
# Usage : docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Apporte par-dessus la base :
#   - restart: always (vs unless-stopped)
#   - rotation des logs (json-file, 10 MB × 3 fichiers)
#   - limites de ressources (memory + cpus)
#   - LOG_LEVEL=warn pour réduire le volume de logs
#   - SWAGGER_IN_PROD désactivé (par défaut)
#
# NOTE prod : pour cacher mongo/redis du host, désactive les "ports" dans le
# fichier de base ou utilise un reverse proxy (nginx/traefik/caddy).
# ══════════════════════════════════════════════════════════════════════════════

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  mongo:
    restart: always
    logging: *default-logging

  redis:
    restart: always
    logging: *default-logging

  mongo-init:
    logging: *default-logging

  server:
    restart: always
    environment:
      LOG_LEVEL: warn
      NODE_ENV: production
      SWAGGER_IN_PROD: "false"
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1.5"
        reservations:
          memory: 256M

  worker:
    restart: always
    environment:
      LOG_LEVEL: warn
      NODE_ENV: production
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M

  ia:
    restart: always
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "2.0"
        reservations:
          memory: 256M

  client:
    restart: always
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
