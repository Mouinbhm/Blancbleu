version: "3.9"

# ══════════════════════════════════════════════════════════════════════════════
# BlancBleu — Override production
# Usage : docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Apporte par-dessus la base :
#   - restart: always (vs unless-stopped)
#   - rotation des logs (json-file, 10 MB × 3 fichiers)
#   - limites de ressources (memory + cpus)
#   - LOG_LEVEL=warn pour réduire le volume de logs
#   - SWAGGER_IN_PROD désactivé (par défaut)
#
# NOTE prod : pour cacher mongo/redis du host, désactive les "ports" dans le
# fichier de base ou utilise un reverse proxy (nginx/traefik/caddy).
# ══════════════════════════════════════════════════════════════════════════════

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  mongo:
    restart: always
    logging: *default-logging

  redis:
    restart: always
    logging: *default-logging

  mongo-init:
    logging: *default-logging

  server:
    restart: always
    environment:
      LOG_LEVEL: warn
      NODE_ENV: production
      SWAGGER_IN_PROD: "false"
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1.5"
        reservations:
          memory: 256M

  worker:
    restart: always
    environment:
      LOG_LEVEL: warn
      NODE_ENV: production
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M

  ia:
    restart: always
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "2.0"
        reservations:
          memory: 256M

  client:
    restart: always
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"

  # ─── Backup MongoDB quotidien (dump gzip + rétention 30j) ─────────────────
  # Boucle 24h appelant scripts/backup.sh. RPO 24h. Restauration via
  # scripts/restore.sh (cf. docs/operations.md §6).
  backup:
    image: mongo:7
    container_name: blancbleu-backup
    restart: always
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://${MONGO_USER:?MONGO_USER must be set in .env}:${MONGO_PASSWORD:?MONGO_PASSWORD must be set in .env}@mongo:27017/blancbleu?replicaSet=rs0&authSource=admin&directConnection=true
      BACKUP_DIR: /backups
      RETENTION_DAYS: "30"
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
      - ./scripts/restore.sh:/restore.sh:ro
    entrypoint:
      - bash
      - -c
      - |
        echo "[backup] service démarré — dump quotidien (RPO 24h)"
        while true; do
          bash /backup.sh || echo "[backup] échec — nouvelle tentative dans 24h"
          sleep 86400
        done
    logging: *default-logging
    networks:
      - blancbleu-net
