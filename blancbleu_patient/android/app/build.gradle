plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

// Sprint M4 — Firebase : apply plugin google-services UNIQUEMENT si le
// fichier de config est present (degradation gracieuse, build OK sans).
if (file('google-services.json').exists()) {
    apply plugin: 'com.google.gms.google-services'
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

// Sprint M5 — Release signing : lit key.properties (gitignored) si present,
// sinon fallback debug key (pour preserver `flutter run --release` en local
// sans avoir la prod keystore). Template : key.properties.example.
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withReader('UTF-8') { reader ->
        keystoreProperties.load(reader)
    }
}

android {
    namespace "fr.blancbleu.blancbleu_patient"
    compileSdk 35
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "fr.blancbleu.blancbleu_patient"
        minSdk 21
        targetSdk 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    // Sprint M5 — Flavors env (dev / staging / prod).
    // Les 3 sont installables en parallele (applicationIdSuffix). Le DSN Sentry
    // et l'URL API sont injectes via --dart-define au build (cf. mobile-build.md).
    // Build :
    //   flutter build apk --flavor dev      --dart-define=FLAVOR=dev
    //   flutter build apk --flavor staging  --dart-define=FLAVOR=staging --dart-define=SENTRY_DSN=...
    //   flutter build apk --flavor prod     --dart-define=FLAVOR=prod    --dart-define=SENTRY_DSN=...
    flavorDimensions "env"
    productFlavors {
        dev {
            dimension "env"
            applicationIdSuffix ".dev"
            versionNameSuffix "-dev"
        }
        staging {
            dimension "env"
            applicationIdSuffix ".staging"
            versionNameSuffix "-staging"
        }
        prod {
            dimension "env"
            // pas de suffix : applicationId = fr.blancbleu.blancbleu_patient
        }
    }

    signingConfigs {
        release {
            if (keystoreProperties['storeFile']) {
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
            }
        }
    }

    buildTypes {
        release {
            // Si key.properties present -> signing release.
            // Sinon -> debug key (permet `flutter run --release` local).
            signingConfig keystoreProperties['storeFile']
                ? signingConfigs.release
                : signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}

dependencies {}
