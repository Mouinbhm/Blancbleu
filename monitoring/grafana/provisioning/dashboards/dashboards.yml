# Provider de dashboards : charge tous les JSON de /var/lib/grafana/dashboards
# au démarrage. Le dossier est monté depuis monitoring/grafana/dashboards.
apiVersion: 1

providers:
  - name: BlancBleu
    orgId: 1
    folder: BlancBleu
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
