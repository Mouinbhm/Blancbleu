server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Pas de banner Nginx en réponse
    server_tokens off;

    # Sécurité de base — headers HTTP recommandés
    add_header X-Content-Type-Options    "nosniff"        always;
    add_header X-Frame-Options           "SAMEORIGIN"     always;
    add_header Referrer-Policy           "no-referrer"    always;
    add_header X-XSS-Protection          "1; mode=block"  always;

    # Routing React SPA : toute URL inconnue renvoie vers index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Pas de cache sur index.html
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Cache long sur les assets statiques (CRA génère des noms hashés)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
