<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BlancBleu — Hors ligne</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        padding: 24px;
      }
      .card {
        max-width: 480px;
        text-align: center;
        background: #1e293b;
        border-radius: 16px;
        padding: 32px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      }
      h1 { margin: 0 0 12px; font-size: 24px; color: #1D6EF5; }
      p  { margin: 12px 0; color: #cbd5e1; line-height: 1.5; }
      button {
        margin-top: 16px;
        padding: 10px 24px;
        background: #1D6EF5;
        color: white;
        border: 0;
        border-radius: 8px;
        font-size: 14px;
        cursor: pointer;
      }
      button:hover { background: #1557c2; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Connexion perdue</h1>
      <p>BlancBleu n'a pas pu joindre le serveur.</p>
      <p>Vérifiez votre connexion réseau, puis réessayez.</p>
      <button onclick="location.reload()">Réessayer</button>
    </div>
  </body>
</html>
