name: bb_core
description: Shared mobile core for BlancBleu apps (driver + patient) — typed models, network, errors, socket events.
version: 0.1.0
publish_to: 'none'

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  flutter_secure_storage: ^9.0.0
  socket_io_client: ^2.0.3+1
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.19
  asn1lib: ^1.6.5
  crypto: ^3.0.3
  sentry_flutter: ^8.14.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  flutter_lints: ^3.0.0
