services:
  mongo:
    image: mongo:7
    container_name: blancbleu-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-rootpass}
    volumes:
      - mongo_data:/data/db
    networks:
      - blancbleu-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: blancbleu-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - blancbleu-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: blancbleu-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file: .env
    depends_on:
      - mongo
      - redis
    networks:
      - blancbleu-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  ai:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: blancbleu-ai
    restart: unless-stopped
    ports:
      - "5002:5002"
    env_file: .env
    networks:
      - blancbleu-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: blancbleu-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - blancbleu-net

volumes:
  mongo_data:
  redis_data:

networks:
  blancbleu-net:
    driver: bridge
